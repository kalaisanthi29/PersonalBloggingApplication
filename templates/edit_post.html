{% extends "base.html" %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST">

    <input
        type="text"
        name="title"
        value="{{ post.title }}"
        required
    >

    <br><br>

    <textarea
        name="body"
        required
    >{{ post.body }}</textarea>

    <br><br>

    <button type="submit">
        Update Post
    </button>

</form>

<br>

<a href="/">Back Home</a>

{% endblock %}
