{% extends "base.html" %}

{% block content %}

<h2>{{ post.title }}</h2>

<p>{{ post.body }}</p>

<hr>

<h3>Comments</h3>

{% for comment in comments %}

    <p>
        <strong>{{ comment.author }}</strong>
    </p>

    <p>{{ comment.content }}</p>

    <hr>

{% endfor %}

<h3>Add Comment</h3>

<form action="/post/{{ post.id }}/comment" method="POST">

    <input
        type="text"
        name="author"
        placeholder="Your name"
        required
    >

    <br><br>

    <textarea
        name="content"
        placeholder="Write comment..."
        required
    ></textarea>

    <br><br>

    <button type="submit">
        Add Comment
    </button>

</form>

<br>

<a href="/edit/{{ post.id }}">
    Edit Post
</a>

<br><br>

<form action="/delete/{{ post.id }}" method="POST">

    <button type="submit">
        Delete Post
    </button>

</form>

<br>

<a href="/">Back Home</a>

{% endblock %}
