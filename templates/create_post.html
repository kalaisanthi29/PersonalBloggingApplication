{% extends "base.html" %}

{% block content %}

<h2>Create New Post</h2>

<form method="POST">

    <input
        type="text"
        name="title"
        placeholder="Post title"
        required
    >

    <br><br>

    <textarea
        name="body"
        placeholder="Write your post..."
        required
    ></textarea>

    <br><br>

    <button type="submit">
        Create Post
    </button>

</form>

<br>

<a href="/">Back Home</a>

{% endblock %}
